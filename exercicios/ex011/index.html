<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HMTL5</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir essa imagem em varios dispositivos diferentes</p>

    <picture>
        <source media="(max-width:750px )" srcset="imagens/ImgP.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/ImgM.png" type="image/png">
        <img src="Imagens/ImgG.png" alt="imagem-flexivel">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos usar audio no site</p>
    <audio preload="metadata" autoplay controls>
        <source src="midia/happy-mistake.mp3" type="audio/mpeg">
        <source src="midia/happy-mistake.ogg" type="audio/ogg">
        <source src="midia/happy-mistake.wav" type="audio/wav">
        <p>Infelizmente o seu navegador não consegue reproduzir audio. <a href="midia/happy-mistake.mp3">Click aqui para baixar o audio MP3</a></p>
    </audio>
</body>
</html>
