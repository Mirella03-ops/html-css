<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uso de tavelas grandes</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif
            ;
        }

        table{
            width: 500px;
            border-collapse: collapse;
        }

        td, th{
            border: 1px solid black;
            padding: 10 px;
            text-align: center;
        }

        thead, tfoot{
            background-color: gray;
            color: white;
        }

        td.num{
            text-align: right;
        }
    </style>
    <!--Anatomia oara tabelas grandes
    Table
        Thead
            TR, TD, TH
            TBODY
                TR, TD, TH
                TFOOT
                    TR, TD, TH

    -->
    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
            <tbody>
                <tr>
                    <td>São Paulo</td>
                    <td class="num">45.919.049</td>
                </tr>
                <tr>
                    <td>Minas Gerais</td>
                    <td class="num">21.168.791</td>
                </tr>
                <tfoot>
                    <tr>
                        <th>Total de Habitantes</th> <!--Título-->
                        <td class="num"><strong>67.087.840</strong></td> <!--Dados-->
                    </tr>
                </tfoot>
            </tbody>
        </thead>
    </table>
</head>
<body>
    
</body>
</html>
