<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixa</title>
    <style>
        h1{
            background-color: blueviolet;
            height: 300px;
            width: 300px;
            border: 10px solid violet;
    
            padding: 10px;

            margin: 10px 10px 10px 10px;

            outline: 5px groove purple;
        }

        a{
            padding-top: 15px;
    padding-right: 10px;
    padding-left: 15px;
    padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Os parágrafos também são exemplos de box-level, mas os <a href="#">Links são exemplos de Inline-level</a>Vamos ver como tudo isso funciona na prática</p>
</body>
</html>
